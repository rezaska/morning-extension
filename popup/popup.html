<!doctype html>
<html>
  <head>
    <title>Morning app</title>
    <link rel="stylesheet" href="./popup.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap"
      rel="stylesheet">
  </head>

  <body>
    <div class="app">
      <header class="header">
        <h1 class="app-title">Morning!</h1>
        <p class="app-subtitle">Schedule a moment for yourself.</p>

        <div class="buttons">
          <div class="icon-item">
            <button id="button1" type="button" class="icon-btn">
              <img src="../assets/morning.png" alt="morning" class="day-icon" id="morning">
            </button>
            <span class="icon-label">Morning</span>
          </div>
          <div class="icon-item">
            <button id="button2" type="button" class="icon-btn">
              <img src="../assets/afternoon-off.png" alt="afternoon" class="day-icon" id="afternoon">
            </button>
            <span class="icon-label">Afternoon</span>
          </div>
          <div class="icon-item">
            <button id="button3" type="button" class="icon-btn">
              <img src="../assets/evening-off.png" alt="evening" class="day-icon" id="evening">
            </button>
            <span class="icon-label">Evening</span>
          </div>
        </div>
      </header>

      <div class="card">
        <div class="field">
          <span class="field-label">Task</span>
          <div class="chip-group" id="task-group">
            <button type="button" class="chip task-chip active" data-task="walk">Walk</button>
            <button type="button" class="chip task-chip" data-task="hydrate">Hydrate</button>
          </div>
        </div>

        <div class="field" id="length-field">
          <span class="field-label">Length (minutes)</span>
          <div class="chip-group" id="length-group">
            <button type="button" class="chip length-chip" data-min="5">5</button>
            <button type="button" class="chip length-chip active" data-min="10">10</button>
            <button type="button" class="chip length-chip" data-min="15">15</button>
            <button type="button" class="chip length-chip" data-min="25">25</button>
            <input type="number" id="length-custom" class="chip-input" placeholder="min" min="1" max="120" step="1">
          </div>
        </div>

        <div class="field">
          <span class="field-label" id="start-label">Start in</span>
          <div class="chip-group" id="relative-group">
            <button type="button" class="chip start-chip active" data-min="15">15<span class="unit">min</span></button>
            <button type="button" class="chip start-chip" data-min="30">30<span class="unit">min</span></button>
            <button type="button" class="chip start-chip" data-min="60">60<span class="unit">min</span></button>
            <button type="button" class="chip" id="time-chip" aria-label="Pick a specific time">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="9"></circle>
                <path d="M12 7.5V12l3 2"></path>
              </svg>
            </button>
          </div>

          <div class="time-picker hidden" id="time-picker">
            <select id="hour" class="time-select" aria-label="Hour">
              <option>1</option><option>2</option><option>3</option><option>4</option>
              <option>5</option><option>6</option><option>7</option><option selected>8</option>
              <option>9</option><option>10</option><option>11</option><option>12</option>
            </select>
            <span class="time-colon">:</span>
            <select id="minute" class="time-select" aria-label="Minute">
              <option>00</option><option>05</option><option>10</option><option>15</option>
              <option>20</option><option>25</option><option>30</option><option>35</option>
              <option>40</option><option>45</option><option>50</option><option>55</option>
            </select>
            <select id="ampm" class="time-select" aria-label="AM or PM">
              <option>AM</option><option>PM</option>
            </select>
          </div>
        </div>

        <div class="field">
          <span class="field-label">Repeat</span>
          <div class="chip-group" id="repeat-group">
            <button type="button" class="chip repeat-chip active" data-repeat="once">Once</button>
            <button type="button" class="chip repeat-chip" data-repeat="daily">Every day</button>
          </div>
        </div>
      </div>

      <button class="my-btn">Start</button>

      <div class="scheduled-task hidden"></div>

      <div class="website-text">
        <a href="https://momentum-3d6afa.webflow.io/" target="_blank">try<b>morning</b>.com</a>
      </div>
    </div>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
